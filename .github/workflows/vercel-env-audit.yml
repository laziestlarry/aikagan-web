name: Vercel Environment Audit

on:
  pull_request:
    paths:
      - "scripts/audit-vercel-env.mjs"
      - ".github/workflows/vercel-env-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-env-names:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull preview environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
      - name: Audit preview key presence only
        run: node scripts/audit-vercel-env.mjs .vercel/.env.preview.local
      - name: Pull production environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
      - name: Audit production key presence only
        run: node scripts/audit-vercel-env.mjs .vercel/.env.production.local
