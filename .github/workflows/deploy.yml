name: Build and Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: true
  VERCEL_ORG_ID: team_67a8OdMpiLhKbsLZ7HVcDsfh
  VERCEL_PROJECT_ID: prj_ZBuPJBcchGEU62MAkHWJRTBQqwig

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.head_ref }}" = "ops/release-featured-checkout" ]; then
            vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --scope=${VERCEL_ORG_ID}
          else
            vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }} --scope=${VERCEL_ORG_ID}
          fi

      - name: Build with Vercel
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.head_ref }}" = "ops/release-featured-checkout" ]; then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=${VERCEL_ORG_ID}
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }} --scope=${VERCEL_ORG_ID}
          fi

      - name: Preview deployment ownership
        if: github.event_name == 'pull_request' && github.head_ref != 'ops/release-featured-checkout'
        run: echo "Preview deployment is handled by the repository's Vercel Git Integration; Actions validates the build only."

      - name: Deploy production
        if: (github.event_name != 'pull_request' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.head_ref == 'ops/release-featured-checkout')
        shell: bash
        run: |
          set -o pipefail
          vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }} --scope=${VERCEL_ORG_ID} 2>&1 | tee vercel-production-deploy.log

      - name: Upload production deploy evidence
        if: always() && github.head_ref == 'ops/release-featured-checkout'
        uses: actions/upload-artifact@v4
        with:
          name: vercel-production-deploy-evidence
          path: vercel-production-deploy.log
          if-no-files-found: ignore
          retention-days: 3
