<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#F5D76E"/>
      <stop offset="100%" style="stop-color:#C9923A"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0F19"/>
      <stop offset="100%" style="stop-color:#1A1F2E"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <rect x="4" y="4" width="112" height="112" rx="24" fill="url(#bg)" stroke="url(#gold)" stroke-width="3"/>
  <!-- Inner glow -->
  <circle cx="60" cy="60" r="36" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <!-- A letterform -->
  <text x="60" y="84" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="900" fill="url(#gold)">A</text>
  <!-- Accent dots -->
  <circle cx="28" cy="28" r="3" fill="#D4AF37" opacity="0.4"/>
  <circle cx="92" cy="92" r="3" fill="#D4AF37" opacity="0.4"/>
  <circle cx="92" cy="28" r="2" fill="#D4AF37" opacity="0.2"/>
  <circle cx="28" cy="92" r="2" fill="#D4AF37" opacity="0.2"/>
</svg>
